            display: flex;
            justify-content: center;
            align-items: center;
        }

        body {
            padding: 10px;
        }

        .gameboy-console {
            width: 100%;
            max-width: 500px;
            max-height: 95vh;
            background: #a8a8a8;
            border-radius: 15px 15px 50px 50px / 15px 15px 40px 40px;
            box-shadow:
                5px 5px 15px rgba(0,0,0,0.5),
                inset -2px -2px 5px rgba(0,0,0,0.3),
                inset 2px 2px 5px rgba(255,255,255,0.7);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .screen-area {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .screen-frame {
            background: #8b956d;
            padding: 15px;
            border-radius: 8px;
            box-shadow:
                inset 2px 2px 8px rgba(0,0,0,0.7),
                inset -2px -2px 5px rgba(255,255,255,0.3);
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .game-board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 10 / 20;
            background-color: #9bbc0f;
            border: 2px solid #0f380f;
            box-shadow: inset 0 0 15px rgba(15, 56, 15, 0.5);
            overflow: hidden;
            container-type: inline-size;   /* permite escalar el menu al ancho real */
        }

        .game-board {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .board-cells {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: repeat(20, 1fr);
            grid-template-columns: repeat(10, 1fr);
        }

        .cell {
            border: 0.5px solid rgba(15, 56, 15, 0.2);
        }

        .tetromino {
            border: 1px solid rgba(15, 56, 15, 0.4);
            box-shadow: inset 0 0 3px rgba(15, 56, 15, 0.3);

        /* Ghost piece: solo contorno del color, sin relleno */
        .ghost {
            background-color: transparent !important;
            border: 1px dashed rgba(15, 56, 15, 0.55);
            box-shadow: none;
        }

        /* Paleta de colores con alto contraste */
        .I { background-color: #8bd8f0; } /* Cyan */
        .J { background-color: #3f51f7; } /* Blue */
        .L { background-color: #ffb86c; } /* Orange */
        .O { background-color: #edd400; } /* Yellow */
        .S { background-color: #a0e0a0; } /* Light Green */
        .T { background-color: #c084fc; } /* Purple */
        .Z { background-color: #ff6b6b; } /* Red */

        .lcd-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image:
                repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 1px, transparent 2px, rgba(0,0,0,0.1) 3px),
                repeating-linear-gradient(90deg, rgba(0,0,0,0.1) 0px, transparent 1px, transparent 2px, rgba(0,0,0,0.1) 3px);
            opacity: 0.3;
        }

        .nintendo-logo {
            font-size: 0.7rem;

            margin-top: 10px;

        .controls-section {
            width: 100%;

        }

        .info-panel {
            display: flex;
            gap: 10px;

            justify-content: center;
        }

        .panel {
            background: #7c7c7c;
            border: 2px solid #555;

            box-shadow:
                inset 1px 1px 3px rgba(0,0,0,0.5),

        .d-pad-btn {

        /* Overlays (opciones, pausa, fin de juego) comparten el mismo look LCD */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            opacity: 1;

        /* Tamanos en cqw (relativos al ancho del tablero) con respaldo en rem.
           Asi el menu nunca se sale, sea cual sea el tamano de pantalla. */
        .overlay-title {
            font-size: 1rem;                    /* respaldo */
            font-size: min(10cqw, 1.9rem);

        }

            font-size: 0.55rem;                 /* respaldo */

        /* Selectores tipo stepper para LEVEL y HIGH */
        .selector-row {
            display: flex;

            justify-content: space-between;
            gap: 3cqw;
            width: 100%;
            margin-bottom: 4.5cqw;
        }

            height: 22px;
            width: min(9cqw, 30px);

        .start-button {

            box-shadow: 0 3px 0 #5a0000;

        }
        .start-button:active {

        /* Boton RESUME (verde) para volver a la partida en curso */
        .resume-btn {

        .hidden { display: none !important; }

<body>
    <div class="gameboy-console">
        <div class="screen-area">
            <div class="screen-frame">
                <div class="game-board-container">
                    <div class="game-board">
                        <div class="board-cells" id="boardCells"></div>
                    </div>
                    <div class="lcd-overlay"></div>

                    <!-- Pantalla de opciones / inicio (Type B) -->
                    <div class="overlay active" id="optionsOverlay">
                        <div class="overlay-title" id="optionsTitle">TETRIS</div>
                        <div class="overlay-subtext">TYPE B &mdash; 25 LINES</div>
                        <div class="selector-row">
                            <span class="selector-label">LEVEL</span>
                            <div class="stepper">
                                <button class="stepper-btn" id="levelDown" aria-label="Bajar nivel">&lt;</button>
                                <span class="stepper-value" id="levelValue">0</span>
                                <button class="stepper-btn" id="levelUp" aria-label="Subir nivel">&gt;</button>
                            </div>
                        </div>
                        <div class="selector-row">
                            <span class="selector-label">HIGH</span>
                            <div class="stepper">
                                <button class="stepper-btn" id="highDown" aria-label="Bajar altura">&lt;</button>
                                <span class="stepper-value" id="highValue">0</span>
                                <button class="stepper-btn" id="highUp" aria-label="Subir altura">&gt;</button>
                            </div>
                        </div>
                        <button class="start-button resume-btn hidden" id="resumeButton" aria-label="Volver a la partida">RESUME</button>
                        <button class="start-button" id="startButton" aria-label="Empezar juego">START</button>
                    </div>

                    <!-- Pantalla de pausa -->
                    <div class="overlay" id="pauseOverlay">
                        <div class="overlay-title">PAUSED</div>
                        <div class="overlay-subtext">PAUSE = RESUME</div>
                    </div>

                    <!-- Pantalla de fin de juego -->
                    <div class="overlay" id="gameOverOverlay">
                        <div class="overlay-title" id="gameOverText">GAME OVER</div>
                        <div class="overlay-subtext" id="gameOverSubtext">PRESS MENU</div>
                        <div class="overlay-score" id="gameOverScore"></div>
                        <button class="start-button" id="restartButton" aria-label="Volver al menu">MENU</button>
                    </div>
                </div>
            </div>
            <div class="nintendo-logo">Nintendo&reg;</div>
        </div>

        <div class="controls-section">
            <div class="info-panel">
                <div class="panel">
                    <div class="panel-title">NEXT</div>
                    <div class="next-piece" id="nextPiece"></div>
                </div>
                <div class="panel">
                    <div class="panel-title">INFO</div>
                    <div class="info-item"><span>LINES:</span><span class="info-value" id="lines">25</span></div>
                    <div class="info-item"><span>LEVEL:</span><span class="info-value" id="level">0</span></div>
                    <div class="info-item"><span>SCORE:</span><span class="info-value" id="score">0</span></div>
                </div>
            </div>

            <div class="main-controls">
                <div class="d-pad-container">
                    <div class="d-pad-base"></div>
                    <div class="d-pad-btn" id="dpad-up" aria-label="Soltar hasta abajo">&#9650;</div>
                    <div class="d-pad-btn" id="dpad-down" aria-label="Bajar un espacio">&#9660;</div>
                    <div class="d-pad-btn" id="dpad-left" aria-label="Mover izquierda">&#9668;</div>
                    <div class="d-pad-btn" id="dpad-right" aria-label="Mover derecha">&#9658;</div>
                    <div id="dpad-center"></div>
                </div>
                <div class="action-buttons-container">
                    <button class="gameboy-btn" id="btn-rotate" aria-label="Rotar horario">A</button>
                    <button class="gameboy-btn" id="btn-rotate-counter" aria-label="Rotar antihorario">B</button>
                </div>
            </div>

            <div class="system-buttons">
                <button class="system-btn" id="mobilePause" aria-label="Pausar juego">PAUSE</button>
                <button class="system-btn" id="mobileRestart" aria-label="Abrir menu">MENU</button>
            </div>
        </div>
    </div>

    <script>
        // ===================== Constantes =====================
        const COLS = 10;
        const ROWS = 20;
        const EMPTY = 'empty';
        const TARGET_LINES = 25;           // Type B: ganar al limpiar 25 lineas
        const PIECE_COLORS = 'IJLOSTZ';

        // Velocidad de caida por nivel (ms/fila), curva estilo NES niveles 0-9
        const GRAVITY_MS = [800, 717, 633, 550, 467, 383, 300, 217, 133, 100];

        // DAS (auto-repeticion al mantener)
        const DAS_DELAY = 170;             // retardo antes de repetir
        const DAS_INTERVAL = 50;           // repeticion horizontal
        const SOFT_INTERVAL = 40;          // repeticion de soft-drop

        // Formas base de cada tetromino
        const TETROMINOS = {
            I: { shape: [[1,1,1,1]], color: 'I' },
            J: { shape: [[1,0,0],[1,1,1]], color: 'J' },
            L: { shape: [[0,0,1],[1,1,1]], color: 'L' },
            O: { shape: [[1,1],[1,1]], color: 'O' },
            S: { shape: [[0,1,1],[1,1,0]], color: 'S' },
            T: { shape: [[0,1,0],[1,1,1]], color: 'T' },
            Z: { shape: [[1,1,0],[0,1,1]], color: 'Z' }
        };

        // ===================== Estado =====================
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let bag = [];
        let gameOver = true;
        let isPaused = false;
        let optionsOpen = true;
        let started = false;                // hay una partida en curso (aunque este en el menu)
        let score = 0;
        let totalLines = 0;                 // lineas limpiadas
        let startLevel = 0;                 // nivel elegido (fijo en Type B)
        let startHigh = 0;                  // altura de basura elegida (0-5)
        let gravity = GRAVITY_MS[0];
        let dropAcc = 0;
        let lastTime = 0;

        // ===================== DOM =====================
        const boardCells = document.getElementById('boardCells');
        const nextPieceElement = document.getElementById('nextPiece');
        const linesElement = document.getElementById('lines');
        const levelElement = document.getElementById('level');
        const scoreElement = document.getElementById('score');

        const optionsOverlay = document.getElementById('optionsOverlay');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const gameOverText = document.getElementById('gameOverText');
        const gameOverSubtext = document.getElementById('gameOverSubtext');
        const gameOverScore = document.getElementById('gameOverScore');

        const levelValueEl = document.getElementById('levelValue');
        const highValueEl = document.getElementById('highValue');

        // Celdas del tablero (se crean UNA sola vez para rendimiento)
        let cells = [];
        // Celdas del preview NEXT (4x4, tambien creadas una vez)
        let nextCells = [];

        // ===================== Utilidades =====================
        function deepCopyShape(shape) {
            return shape.map(row => row.slice());
        }

        function emptyRow() {
            return Array.from({ length: COLS }, () => EMPTY);
        }

        // Recorre los bloques activos de una forma en una posicion dada
        function forEachBlock(shape, row, col, fn) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const br = row + r;
                        const bc = col + c;
                        fn(br, bc);
                    }
                }
            }
        }

        // Colision generica para una forma/posicion arbitraria
        function collides(shape, row, col) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const br = row + r;
                        const bc = col + c;
                        if (bc < 0 || bc >= COLS || br >= ROWS) return true;
                        if (br >= 0 && board[br][bc] !== EMPTY) return true;
                    }
                }
            }
            return false;
        }

        // ===================== 7-bag =====================
        function refillBag() {
            const pieces = PIECE_COLORS.split('');
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            bag = pieces;
        }

        function newPiece() {
            if (bag.length === 0) refillBag();
            const type = bag.pop();
            return {
                shape: deepCopyShape(TETROMINOS[type].shape),
                color: TETROMINOS[type].color,
                row: 0,
                col: Math.floor(COLS / 2) - Math.floor(TETROMINOS[type].shape[0].length / 2)
            };
        }

        // ===================== Tablero (crear celdas una vez) =====================
        function buildBoardCells() {
            boardCells.innerHTML = '';
            cells = [];
            for (let i = 0; i < ROWS * COLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                boardCells.appendChild(cell);
                cells.push(cell);
            }
        }

        function buildNextCells() {
            nextPieceElement.innerHTML = '';
            nextCells = [];
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                nextPieceElement.appendChild(cell);
                nextCells.push(cell);
            }
        }

        function createBoard() {
            board = Array.from({ length: ROWS }, () => emptyRow());
        }

        // Rellena la basura inicial de Type B (HIGH * 2 filas)
        function fillGarbage(rows) {
            const colors = PIECE_COLORS;
            for (let r = ROWS - rows; r < ROWS; r++) {
                if (r < 0) continue;
                let filled = 0;
                for (let c = 0; c < COLS; c++) {
                    if (Math.random() < 0.55) {
                        board[r][c] = colors[Math.floor(Math.random() * colors.length)];
                        filled++;
                    }
                }
                // Garantiza al menos un hueco (para que la fila no se limpie sola)
                let holes = [];
                for (let c = 0; c < COLS; c++) if (board[r][c] === EMPTY) holes.push(c);
                if (holes.length === 0) {
                    board[r][Math.floor(Math.random() * COLS)] = EMPTY;
                }
                // Garantiza al menos un bloque
                if (filled === 0) {
                    board[r][Math.floor(Math.random() * COLS)] = colors[Math.floor(Math.random() * colors.length)];
                }
            }
        }

        // ===================== Render =====================
        // Un solo draw() que compone: tablero fijo + ghost + pieza activa
        function draw() {
            // Base: tablero fijo
            for (let i = 0; i < cells.length; i++) {
                const r = (i / COLS) | 0;
                const c = i % COLS;
                const v = board[r][c];
                cells[i].className = (v !== EMPTY) ? ('cell tetromino ' + v) : 'cell';
            }

            if (currentPiece && !gameOver) {
                // Ghost (donde caeria la pieza)
                const gr = getGhostRow();
                forEachBlock(currentPiece.shape, gr, currentPiece.col, (r, c) => {
                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === EMPTY) {
                        cells[r * COLS + c].className = 'cell ghost ' + currentPiece.color;
                    }
                });
                // Pieza activa (sobrescribe al ghost)
                forEachBlock(currentPiece.shape, currentPiece.row, currentPiece.col, (r, c) => {
                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                        cells[r * COLS + c].className = 'cell tetromino ' + currentPiece.color;
                    }
                });
            }
        }

        function drawNext() {
            for (let i = 0; i < nextCells.length; i++) nextCells[i].className = '';
            if (!nextPiece) return;
            const shape = nextPiece.shape;
            // Centrar en la rejilla 4x4
            const offR = Math.floor((4 - shape.length) / 2);
            const offC = Math.floor((4 - shape[0].length) / 2);
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const idx = (r + offR) * 4 + (c + offC);
                        if (idx >= 0 && idx < 16) {
                            nextCells[idx].className = 'tetromino ' + nextPiece.color;
                        }
                    }
                }
            }
        }

        function getGhostRow() {
            let r = currentPiece.row;
            while (!collides(currentPiece.shape, r + 1, currentPiece.col)) r++;
            return r;
        }

        // ===================== HUD =====================
        function updateHUD() {
            const remaining = Math.max(0, TARGET_LINES - totalLines);
            linesElement.textContent = remaining;
            levelElement.textContent = startLevel;   // fijo en Type B
            scoreElement.textContent = score;
        }

        function addScore(points) {
            score = Math.min(999999, score + points);
            scoreElement.textContent = score;
        }

        // ===================== Movimiento =====================
        function moveLeft() {
            if (!currentPiece || gameOver || isPaused) return;
            if (!collides(currentPiece.shape, currentPiece.row, currentPiece.col - 1)) {
                currentPiece.col--;
                draw();
            }
        }

        function moveRight() {
            if (!currentPiece || gameOver || isPaused) return;
            if (!collides(currentPiece.shape, currentPiece.row, currentPiece.col + 1)) {
                currentPiece.col++;
                draw();
            }
        }

        // stepDown(true) = soft drop del jugador (suma puntos); false = gravedad
        function stepDown(isSoft) {
            if (!currentPiece || gameOver || isPaused) return;
            if (collides(currentPiece.shape, currentPiece.row + 1, currentPiece.col)) {
                lockPiece();
            } else {
                currentPiece.row++;
                if (isSoft) addScore(1);
                draw();
            }
            dropAcc = 0;
        }

        function hardDrop() {
            if (!currentPiece || gameOver || isPaused) return;
            let dist = 0;
            while (!collides(currentPiece.shape, currentPiece.row + 1, currentPiece.col)) {
                currentPiece.row++;
                dist++;
            }
            if (dist > 0) addScore(dist * 2);
            lockPiece();
            dropAcc = 0;
        }

        // Rotacion clasica (transposicion) + wall kick basico
        function rotateMatrix(shape, dir) {
            if (dir === 1) {
                // horario
                return shape[0].map((_, i) => shape.map(row => row[i]).reverse());
            } else {
                // antihorario
                return shape[0].map((_, i) => shape.map(row => row[row.length - 1 - i]));
            }
        }

        function tryRotate(dir) {
            if (!currentPiece || gameOver || isPaused) return;
            const rotated = rotateMatrix(currentPiece.shape, dir);
            const colKicks = [0, -1, 1, -2, 2];   // empujes horizontales
            // 1) intentar en la misma fila
            for (const k of colKicks) {
                if (!collides(rotated, currentPiece.row, currentPiece.col + k)) {
                    currentPiece.shape = rotated;
                    currentPiece.col += k;
                    draw();
                    return;
                }
            }
            // 2) intentar subiendo una fila (floor kick simple)
            for (const k of colKicks) {
                if (!collides(rotated, currentPiece.row - 1, currentPiece.col + k)) {
                    currentPiece.shape = rotated;
                    currentPiece.row -= 1;
                    currentPiece.col += k;
                    draw();
                    return;
                }
            }
            // si nada funciona, no rota
        }

        // ===================== Fijar / limpiar / spawn =====================
        function lockPiece() {
            forEachBlock(currentPiece.shape, currentPiece.row, currentPiece.col, (r, c) => {
                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                    board[r][c] = currentPiece.color;
                }
            });
            clearLines();
            if (!gameOver) spawnPiece();
        }

        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(v => v !== EMPTY)) {
                    board.splice(r, 1);
                    board.unshift(emptyRow());
                    cleared++;
                    r++;
                }
            }
            if (cleared > 0) {
                totalLines += cleared;
                const linePoints = [40, 100, 300, 1200];
                addScore(linePoints[cleared - 1] * (startLevel + 1));
                updateHUD();
                if (totalLines >= TARGET_LINES) {
                    endGame(true);
                }
            }
            draw();
        }

        function spawnPiece() {
            currentPiece = nextPiece || newPiece();
            nextPiece = newPiece();
            currentPiece.row = 0;
            currentPiece.col = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
            drawNext();
            if (collides(currentPiece.shape, currentPiece.row, currentPiece.col)) {
                endGame(false);
                return;
            }
            draw();
        }

        // ===================== Flujo de juego =====================
        function startGame() {
            optionsOpen = false;
            gameOver = false;
            isPaused = false;
            started = true;
            score = 0;
            totalLines = 0;
            gravity = GRAVITY_MS[startLevel];
            dropAcc = 0;

            createBoard();
            fillGarbage(startHigh * 2);

            bag = [];
            nextPiece = newPiece();
            spawnPiece();

            updateHUD();
            hideOverlay(optionsOverlay);
            hideOverlay(gameOverOverlay);
            hideOverlay(pauseOverlay);
        }

        function endGame(isWin) {
            gameOver = true;
            started = false;
            currentPiece = null;
            gameOverText.textContent = isWin ? 'YOU WIN!' : 'GAME OVER';
            gameOverSubtext.textContent = isWin ? '25 LINES CLEARED' : 'PRESS MENU';
            gameOverScore.textContent = 'SCORE: ' + score;
            showOverlay(gameOverOverlay);
        }

        function togglePause() {
            if (gameOver || optionsOpen) return;
            isPaused = !isPaused;
            if (isPaused) {
                showOverlay(pauseOverlay);
            } else {
                hideOverlay(pauseOverlay);
                lastTime = performance.now();
                dropAcc = 0;
            }
        }

        // Abre el menu SIN destruir la partida en curso.
        function openMenu() {
            optionsOpen = true;
            isPaused = false;
            hideOverlay(gameOverOverlay);
            hideOverlay(pauseOverlay);

            const resumable = started && !gameOver;   // hay partida a la que volver
            if (resumable) {
                optionsTitle.textContent = 'PAUSED';
                resumeButton.classList.remove('hidden');
                startButton.textContent = 'NEW GAME';
            } else {
                optionsTitle.textContent = 'TETRIS';
                resumeButton.classList.add('hidden');
                startButton.textContent = 'START';
            }
            showOverlay(optionsOverlay);
        }

        // Vuelve a la partida en curso desde el menu.
        function resumeGame() {
            if (!started || gameOver) return;
            optionsOpen = false;
            isPaused = false;
            hideOverlay(optionsOverlay);
            lastTime = performance.now();
            dropAcc = 0;
            draw();
        }

        function showOverlay(el) { el.classList.add('active'); }
        function hideOverlay(el) { el.classList.remove('active'); }

        // ===================== Bucle principal (rAF, independiente de FPS) =====================
        function loop(t) {
            requestAnimationFrame(loop);
            if (gameOver || isPaused || optionsOpen) {
                lastTime = t;
                return;
            }
            const dt = t - lastTime;
            lastTime = t;
            dropAcc += dt;
            if (dropAcc >= gravity) {
                dropAcc -= gravity;
                stepDown(false);
            }
        }

        // ===================== Controles =====================
        // Mantener presionado con auto-repeticion (DAS)
        function bindHold(el, action, delay, interval) {
            let dasTimer = null;
            let repTimer = null;
            const stop = () => {
                if (dasTimer) { clearTimeout(dasTimer); dasTimer = null; }
                if (repTimer) { clearInterval(repTimer); repTimer = null; }
            };
            const start = (e) => {
                e.preventDefault();
                stop();
                action();
                dasTimer = setTimeout(() => {
                    repTimer = setInterval(action, interval);
                }, delay);
            };
            el.addEventListener('pointerdown', start);
            el.addEventListener('pointerup', stop);
            el.addEventListener('pointerleave', stop);
            el.addEventListener('pointercancel', stop);
        }

        // Pulsacion simple para controles de JUEGO (respuesta inmediata)
        function bindTap(el, action) {
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                action();
            });
        }

        // Pulsacion para botones de INTERFAZ (menu, pausa, start).
        // 'click' es lo mas fiable en moviles/iOS y no necesita respuesta instantanea.
        function bindClick(el, action) {
            el.addEventListener('click', (e) => {
                e.preventDefault();
                action();
            });
        }

        const dpadUp = document.getElementById('dpad-up');
        const dpadDown = document.getElementById('dpad-down');
        const dpadLeft = document.getElementById('dpad-left');
        const dpadRight = document.getElementById('dpad-right');
        const btnRotate = document.getElementById('btn-rotate');
        const btnRotateCounter = document.getElementById('btn-rotate-counter');
        const mobilePause = document.getElementById('mobilePause');
        const mobileRestart = document.getElementById('mobileRestart');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const resumeButton = document.getElementById('resumeButton');
        const optionsTitle = document.getElementById('optionsTitle');

        bindHold(dpadLeft, moveLeft, DAS_DELAY, DAS_INTERVAL);
        bindHold(dpadRight, moveRight, DAS_DELAY, DAS_INTERVAL);
        bindHold(dpadDown, () => stepDown(true), DAS_DELAY, SOFT_INTERVAL);
        bindTap(dpadUp, hardDrop);
        bindTap(btnRotate, () => tryRotate(1));
        bindTap(btnRotateCounter, () => tryRotate(-1));
        bindClick(mobilePause, togglePause);   // PAUSE = pausa en el sitio
        bindClick(mobileRestart, openMenu);    // MENU  = abre menu (sin perder la partida)
        bindClick(startButton, startGame);     // START / NEW GAME
        bindClick(resumeButton, resumeGame);   // RESUME = volver a la partida
        bindClick(restartButton, openMenu);    // desde fin de partida -> menu

        // Steppers de opciones
        function updateSelectors() {
            levelValueEl.textContent = startLevel;
            highValueEl.textContent = startHigh;
        }
        bindClick(document.getElementById('levelDown'), () => { startLevel = Math.max(0, startLevel - 1); updateSelectors(); });
        bindClick(document.getElementById('levelUp'),   () => { startLevel = Math.min(9, startLevel + 1); updateSelectors(); });
        bindClick(document.getElementById('highDown'),  () => { startHigh = Math.max(0, startHigh - 1); updateSelectors(); });
        bindClick(document.getElementById('highUp'),    () => { startHigh = Math.min(5, startHigh + 1); updateSelectors(); });

        // Teclado (escritorio)
        document.addEventListener('keydown', (e) => {
            if (optionsOpen) {
                if (e.key === 'Enter') { e.preventDefault(); startGame(); }
                else if (e.key === 'Escape' && started && !gameOver) { e.preventDefault(); resumeGame(); }
                return;
            }
            if (gameOver) {
                if (e.key === 'Enter') { e.preventDefault(); openMenu(); }
                return;
            }
            switch (e.key) {
                case 'ArrowLeft':  e.preventDefault(); moveLeft(); break;
                case 'ArrowRight': e.preventDefault(); moveRight(); break;
                case 'ArrowDown':  e.preventDefault(); stepDown(true); break;
                case 'ArrowUp':
                case 'x': case 'X': e.preventDefault(); tryRotate(1); break;
                case 'z': case 'Z': e.preventDefault(); tryRotate(-1); break;
                case ' ':          e.preventDefault(); hardDrop(); break;
                case 'p': case 'P': togglePause(); break;
            }
        });

        // ===================== Init =====================
        buildBoardCells();
        buildNextCells();
        createBoard();
        updateSelectors();
        updateHUD();
        draw();
        drawNext();
        requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(loop); });
    </script>

    <!-- Registro del service worker (habilita el modo sin conexion) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js')
                    .catch(function (err) { console.log('SW no registrado:', err); });
            });
        }
    </script>
</body>
